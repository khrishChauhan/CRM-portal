services:
  # 🌐 Backend Service (Node.js)
  - type: web
    name: crm-api
    plan: free
    region: singapore
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: CLIENT_URL
        fromService:
          name: crm-frontend
          type: web
          property: url
      - key: ADMIN_GMAIL_USER
        sync: false
      - key: ADMIN_GMAIL_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

  # 🎨 Frontend Service (Static Site)
  - type: web
    name: crm-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: crm-api
          type: web
          property: url
