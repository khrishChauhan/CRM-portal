services:
  # ═══════════════════════════════════════════════════════
  # 🌐 Backend — Node.js + Express API
  # ═══════════════════════════════════════════════════════
  - type: web
    name: crm-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

  # ═══════════════════════════════════════════════════════
  # 🎨 Frontend — React + Vite Static Site
  # ═══════════════════════════════════════════════════════
  - type: web
    name: crm-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
